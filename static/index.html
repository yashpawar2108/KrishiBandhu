<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KrishiBandhu - Chat Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-green: #2d6a4f;
            --dark-green: #1b4332;
            --light-green: #b7e4c7;
            --user-blue: #0077b6;
            --bot-bg: #f1f1f1;
            --bg-color: #f4fbf7;
        }
        body {
            font-family: 'Poppins', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .main-container {
            display: flex;
            width: 100%;
            height: 100%;
        }
        .chat-container {
            flex: 2;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.98);
            border-right: 2px solid #e0e0e0;
        }
        .sidebar {
            flex: 1;
            background: #f9fafb;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }
        header {
            background: var(--primary-green);
            color: white;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 3px solid var(--light-green);
        }
        header h1 {
            margin: 0;
            font-size: 1.5rem;
        }
        .location-bar {
            padding: 10px 20px;
            background: #f0f4f8;
            display: flex;
            gap: 10px;
        }
        .location-bar input {
            flex-grow: 1;
            padding: 5px 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        #chat-window {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 85%;
            line-height: 1.5;
            white-space: pre-line;
        }
        .user-message {
            background-color: var(--user-blue);
            color: white;
            align-self: flex-end;
        }
        .bot-message {
            background-color: var(--bot-bg);
            color: #333;
            align-self: flex-start;
        }
        #chat-form {
            display: flex;
            padding: 15px;
            gap: 10px;
            background: #f0f4f8;
            border-top: 1px solid #e0e0e0;
        }
        #message-input {
            flex-grow: 1;
            padding: 10px 15px;
            border: 1px solid #ccc;
            border-radius: 20px;
            font-size: 1rem;
            height: 24px;
        }
        #send-btn {
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .chart-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .chart-title {
            font-weight: 600;
            color: var(--primary-green);
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="main-container">
    <!-- Chat section -->
    <div class="chat-container">
        <header>
            <h1>🌾 KrishiBandhu Assistant</h1>
        </header>
        <div class="location-bar">
            <label for="location">📍</label>
            <input type="text" id="location" placeholder="e.g., Guwahati, IN">
        </div>
        <div id="chat-window"></div>
        <form id="chat-form">
            <textarea id="message-input" placeholder="Ask your question here..." rows="1"></textarea>
            <button id="send-btn" type="submit">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                     viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </button>
        </form>
    </div>

    <!-- Weather charts section -->
    <div class="sidebar">
        <div class="chart-card">
            <div class="chart-title">📊 Temperature Forecast (High/Low)</div>
            <canvas id="tempChart"></canvas>
        </div>
        <div class="chart-card">
            <div class="chart-title">🌧 Rain Forecast</div>
            <canvas id="rainChart"></canvas>
        </div>
    </div>
</div>

<script>
const chatWindow = document.getElementById('chat-window');
const chatForm = document.getElementById('chat-form');
const messageInput = document.getElementById('message-input');
const locationInput = document.getElementById('location');

let tempChart, rainChart;

// Function to append message in chat
function appendMessage(text, sender) {
    const messageDiv = document.createElement('div');
    messageDiv.classList.add('message', `${sender}-message`);
    messageDiv.textContent = text;
    chatWindow.appendChild(messageDiv);
    chatWindow.scrollTop = chatWindow.scrollHeight;
}

// Function to update weather charts
function updateWeatherCharts(weatherData) {
    const lines = weatherData.trim().split("\n");
    const dailyTemps = {};
    const dailyRain = {};

    lines.forEach(line => {
        const matchTemp = line.match(/^(\d{4}-\d{2}-\d{2}).*?:\s*([\d.]+)°C.*?,\s*(.*)$/);
        if (matchTemp) {
            const date = matchTemp[1];
            const temp = parseFloat(matchTemp[2]);
            const rainMatch = matchTemp[3].match(/rain|drizzle/i) ? Math.random() * 10 : 0; // Placeholder: random mm
            if (!dailyTemps[date]) dailyTemps[date] = [];
            dailyTemps[date].push(temp);
            dailyRain[date] = (dailyRain[date] || 0) + rainMatch;
        }
    });

    const labels = Object.keys(dailyTemps).sort();
    const highTemps = labels.map(d => Math.max(...dailyTemps[d]));
    const lowTemps = labels.map(d => Math.min(...dailyTemps[d]));
    const rainVals = labels.map(d => dailyRain[d] || 0);

    if (tempChart) tempChart.destroy();
    if (rainChart) rainChart.destroy();

    tempChart = new Chart(document.getElementById('tempChart'), {
        type: 'bar',
        data: {
            labels,
            datasets: [
                { label: 'High °C', data: highTemps, backgroundColor: '#e74c3c' },
                { label: 'Low °C', data: lowTemps, backgroundColor: '#3498db' }
            ]
        }
    });

    rainChart = new Chart(document.getElementById('rainChart'), {
        type: 'line',
        data: {
            labels,
            datasets: [{ label: 'Rain (mm)', data: rainVals, backgroundColor: '#00a8cc', borderColor: '#0077b6', fill: true }]
        }
    });
}

// Fetch weather when location changes
locationInput.addEventListener('change', async () => {
    const location = locationInput.value.trim();
    if (!location) return;
    const res = await fetch(`/api/v1/farmer/chat?location=${encodeURIComponent(location)}`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer sample_token_123" },
        body: JSON.stringify({ message: "weather" })
    });
    const data = await res.json();
    if (data.weather_raw) updateWeatherCharts(data.weather_raw);
});

// Chat form submit
chatForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const message = messageInput.value.trim();
    const location = locationInput.value.trim();
    if (!message) return;
    appendMessage(message, 'user');
    messageInput.value = '';

    const res = await fetch("/api/v1/farmer/chat" + (location ? `?location=${encodeURIComponent(location)}` : ""), {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer sample_token_123" },
        body: JSON.stringify({ message })
    });
    const data = await res.json();
    appendMessage(data.response || "No response", 'bot');
    if (data.weather_raw) updateWeatherCharts(data.weather_raw);
});

window.addEventListener('load', () => {
    appendMessage("Hello! I am KrishiBandhu. Please set your location for weather-based advice.", 'bot');
    locationInput.value = "Guwahati, Assam";
});
</script>
</body>
</html>
